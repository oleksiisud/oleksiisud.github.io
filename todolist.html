<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Do List</title>
  <link rel="stylesheet" type="text/css" href="todolist.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
  <div class="container">
  	<div>
  		<div class="conf"></div>
  		<div class="conf"></div>
  		<div class="conf"></div>
  		<div class="conf"></div>
  		<div class="conf"></div>
  		<div class="conf"></div>
  		<div class="conf"></div>
  		<div class="conf"></div>
  		<div class="conf"></div>
  		<div class="conf"></div>
  		<div class="conf"></div>
  		<div class="conf"></div>
  		<div class="conf"></div>
  		<div class="conf"></div>
  		<div class="conf"></div>
  	</div>
    <h1 class="title">To Do List</h1>
    <div id="menu">
	    <div id="tasks">
	      <!-- Task list will be appended here -->
	    </div>
	    <form id="addTaskForm">
	      <div class="formGroup">
	        <label for="taskName" class="newTaskLabel">Task:</label>
	        <input type="text" class="formControl" id="taskName" required>
	      </div>
	      <div class="formGroup">
	        <label for="dueDate" class="newTaskLabel">Due Date:</label>
	        <input type="date" class="formControl" id="dueDate">
	      </div>
	      <div class="formGroup">
	        <label for="priority" class="newTaskLabel">Priority:</label>
	        <select class="formControl" id="priority">
	          <option value="low">Low</option>
	          <option value="medium">Medium</option>
	          <option value="high">High</option>
	        </select>
	      </div>
	      <button type="submit" class="primaryButton">Add Task</button>
	    </form>
	</div>
  </div>
  <script type="text/javascript" src="todolist.js"></script>
</body>
</html>
